<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flinder — Flipchart Finder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="3" width="16" height="13" rx="1.5"></rect>
          <line x1="9" y1="3" x2="9" y2="2"></line>
          <line x1="15" y1="3" x2="15" y2="2"></line>
          <line x1="8" y1="16" x2="5.5" y2="22"></line>
          <line x1="16" y1="16" x2="18.5" y2="22"></line>
          <line x1="8" y1="7.5" x2="16" y2="7.5"></line>
          <line x1="8" y1="11" x2="13" y2="11"></line>
        </svg>
        <div>
          <h1>Flinder</h1>
          <p class="tagline">An AI flipchart finder for luxury resorts.</p>
        </div>
      </div>
      <nav class="tabs" role="tablist" aria-label="Sections">
        <button class="tab is-active" role="tab" aria-selected="true" data-tab="flipcharts">Flipcharts</button>
        <button class="tab" role="tab" aria-selected="false" data-tab="locations">Locations</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Flipcharts view -->
    <section id="view-flipcharts" class="view">
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
          </svg>
          <input type="search" id="search-input" placeholder="Search flipcharts, locations, notes…" aria-label="Search flipcharts">
        </div>
        <select id="location-filter" aria-label="Filter by location">
          <option value="">All locations</option>
        </select>
        <button class="btn btn-primary" id="add-flipchart-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Add flipchart
        </button>
      </div>

      <div class="status-chips" id="status-chips" role="group" aria-label="Filter by status">
        <button class="chip is-active" data-status="">All <span class="chip-count"></span></button>
        <button class="chip chip-available" data-status="available">Available <span class="chip-count"></span></button>
        <button class="chip chip-in-use" data-status="in-use">In use <span class="chip-count"></span></button>
        <button class="chip chip-needs-supplies" data-status="needs-supplies">Needs supplies <span class="chip-count"></span></button>
      </div>

      <div id="flipchart-grid" class="card-grid" aria-live="polite"></div>
      <div id="flipcharts-empty" class="empty-state" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="3" width="16" height="13" rx="1.5"></rect>
          <line x1="8" y1="16" x2="5.5" y2="22"></line>
          <line x1="16" y1="16" x2="18.5" y2="22"></line>
        </svg>
        <p id="flipcharts-empty-text">No flipcharts found.</p>
      </div>
    </section>

    <!-- Locations view -->
    <section id="view-locations" class="view" hidden>
      <form id="add-location-form" class="toolbar">
        <input type="text" id="new-location-name" placeholder="New location name (e.g. Sunset Deck)" aria-label="New location name" maxlength="60">
        <button class="btn btn-primary" type="submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Add location
        </button>
      </form>
      <div id="location-list" class="location-list"></div>
    </section>
  </main>

  <!-- Add/Edit flipchart modal -->
  <dialog id="flipchart-dialog">
    <form id="flipchart-form" method="dialog">
      <h2 id="flipchart-dialog-title">Add flipchart</h2>
      <label>
        Name
        <input type="text" name="name" required maxlength="60" placeholder="e.g. FC-09">
      </label>
      <label>
        Location
        <select name="location_id"></select>
      </label>
      <label>
        Status
        <select name="status">
          <option value="available">Available</option>
          <option value="in-use">In use</option>
          <option value="needs-supplies">Needs supplies</option>
        </select>
      </label>
      <label>
        Notes
        <textarea name="notes" rows="2" maxlength="300" placeholder="Optional — e.g. reserved for workshop"></textarea>
      </label>
      <div class="dialog-actions">
        <button type="button" class="btn" id="flipchart-cancel-btn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="flipchart-save-btn">Save</button>
      </div>
    </form>
  </dialog>

  <div id="toast-container" class="toast-container" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
